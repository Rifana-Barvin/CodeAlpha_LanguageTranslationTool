<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeAlpha Language Translation Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero d-flex align-items-center justify-content-center text-center">
        <div>
            <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" class="logo mb-3">
            <h1 class="text-white">🌐 CodeAlpha Language Translator</h1>
            <p class="text-light">Translate text instantly into any language</p>
        </div>
    </section>

    <!-- Main Container -->
    <div class="container mt-5">
        <div class="card p-4 shadow-lg">
            <form method="POST" action="/">
                <div class="mb-3">
                    <label for="text" class="form-label">Enter Text</label>
                    <textarea class="form-control" id="text" name="text" rows="4" placeholder="Type text here..."></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="source_lang" class="form-label">Source Language</label>
                        <select class="form-select" id="source_lang" name="source_lang">
                            <option value="auto">Auto Detect</option>
                            {% for name, code in languages.items() %}
                                <option value="{{ code }}">{{ name.title() }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col">
                        <label for="target_lang" class="form-label">Target Language</label>
                        <select class="form-select" id="target_lang" name="target_lang">
                            {% for name, code in languages.items() %}
                                <option value="{{ code }}">{{ name.title() }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-gradient w-100">Translate</button>
            </form>

            {% if translation %}
            <div class="mt-4">
                <h5>Translated Text:</h5>
                <div class="alert alert-success">{{ translation }}</div>
                <button class="btn btn-secondary" onclick="copyText('{{ translation }}')">📋 Copy</button>
                <button class="btn btn-success" onclick="speakText('{{ translation }}', '{{ target_lang }}')">🔊 Listen</button>
            </div>
            {% endif %}
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
